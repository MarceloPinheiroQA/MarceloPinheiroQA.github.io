layout: default
title: Certificates
---

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<style>
    /* Ajustes para integrar com o fundo azul do seu tema */
    #main_content {
        padding-top: 40px;
        text-align: center;
    }

    /* Estilização do Carrossel */
    .swiper {
        width: 100%;
        padding-top: 50px;
        padding-bottom: 80px;
    }

    .swiper-slide {
        background-position: center;
        background-size: cover;
        width: 300px; /* Ajuste conforme necessário */
        transition: transform 0.6s ease; /* Animação suave ao mover */
        filter: blur(2px) brightness(0.6);
    }

    .swiper-slide-active {
        filter: blur(0) brightness(1);
        transform: scale(1.1);
        z-index: 2;
    }

    .swiper-slide img {
        display: block;
        width: 100%;
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Cores das Setas seguindo seu padrão (Branco) */
    .swiper-button-next, .swiper-button-prev {
        color: #ffffff !important;
        transition: 0.3s;
    }

    .swiper-button-next:hover, .swiper-button-prev:hover {
        color: #10c5f8 !important; /* Azul do seu site no hover */
    }

    /* Legenda dinâmica com a cor azul do seu site */
    #cert-caption {
        margin-top: 20px;
        font-size: 1.5rem;
        font-weight: bold;
        color: #10c5f8; /* Azul claro do seu portfólio */
        min-height: 1.6em;
        transition: opacity 0.4s ease;
    }

    /* Customização dos pontinhos (Pagination) */
    .swiper-pagination-bullet {
        background: #ffffff !important;
        opacity: 0.5;
    }

    .swiper-pagination-bullet-active {
        background: #10c5f8 !important;
        opacity: 1;
    }
</style>

<div id="main_content">
    <section>
        <h2>My Certifications</h2>
        <p>Expertise validated by industry standards.</p>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide" data-name="Certified Tester Foundation Level (CTFL)">
                    <img src="assets/certificados/ctfl.png" alt="CTFL">
                </div>

                <div class="swiper-slide" data-name="Certified Tester Foundation Level - Agile Tester (CTFL-AT)">
                    <img src="assets/certificados/ctfl-at.jpg" alt="CTFL-AT">
                </div>

                </div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>

        <div id="cert-caption">Loading...</div>

    </section>
</div>

<script>
    const caption = document.getElementById('cert-caption');

    const swiper = new Swiper(".mySwiper", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        loop: true,
        speed: 800, // Velocidade da transição (mais lento e suave)
        autoplay: {
            delay: 5000, // 5 segundos
            disableOnInteraction: false, // Continua após o usuário clicar
        },
        coverflowEffect: {
            rotate: 20,
            stretch: 0,
            depth: 100,
            modifier: 1,
            slideShadows: false,
        },
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
        on: {
            init: function () {
                updateText(this);
            },
            slideChange: function () {
                updateText(this);
            },
        },
    });

    function updateText(instance) {
        const activeSlide = instance.slides[instance.activeIndex];
        const title = activeSlide.getAttribute('data-name');
        
        caption.style.opacity = 0;
        setTimeout(() => {
            caption.innerText = title;
            caption.style.opacity = 1;
        }, 200);
    }
</script>
