<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Marcelo Pinheiro QA</title>
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* Garante que o conteúdo ocupe a tela toda e centralize */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden; /* Evita scroll lateral */
        }

        .main-wrapper {
            width: 100%;
            max-width: 1200px; /* Limite opcional para telas ultra-wide */
            text-align: center;
            padding: 50px 0;
        }

        /* Configuração do Carrossel para ocupar a largura total */
        .swiper {
            width: 100vw; /* 100% da largura da janela */
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 350px; /* Tamanho do certificado no centro */
            transition: 0.4s;
            filter: grayscale(100%) blur(2px);
            opacity: 0.4;
        }

        /* Destaque do certificado central */
        .swiper-slide-active {
            filter: grayscale(0) blur(0);
            opacity: 1;
            transform: scale(1.2);
            z-index: 10;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Legenda dinâmica embaixo do certificado */
        #cert-caption {
            margin-top: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #007acc;
            min-height: 2em;
            transition: opacity 0.3s ease-in-out;
            padding: 0 20px;
        }

        /* Estilização das setas para ficarem visíveis nas pontas da tela */
        .swiper-button-next, .swiper-button-prev {
            color: #007acc;
        }

        @media (max-width: 480px) {
            .swiper-slide { width: 260px; }
            #cert-caption { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>Certificates</h1>
        <hr>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide" data-name="Certified Tester Foundation Level (CTFL)">
                    <img src="assets/certificados/ctfl.png" alt="CTFL Certificate">
                </div>

                <div class="swiper-slide" data-name="Certified Tester Foundation Level - Agile Tester (CTFL-AT)">
                    <img src="assets/certificados/ctfl-at.jpg" alt="CTFL-AT [Agile Tester] Certificate">
                </div>

                </div>
            
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>

        <div id="cert-caption">Loading...</div>

        <br><br>
        <a href="{{ '/' | relative_url }}">← Back to Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const caption = document.getElementById('cert-caption');

        const swiper = new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true, // Com 2 ou mais certificados, o loop funciona bem
            coverflowEffect: {
                rotate: 20,
                stretch: 0,
                depth: 100,
                modifier: 1,
                slideShadows: false,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            on: {
                init: function () {
                    updateText(this);
                },
                slideChange: function () {
                    updateText(this);
                },
            },
        });

        function updateText(instance) {
            const activeSlide = instance.slides[instance.activeIndex];
            const title = activeSlide.getAttribute('data-name');
            
            caption.style.opacity = 0;
            setTimeout(() => {
                caption.innerText = title;
                caption.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
